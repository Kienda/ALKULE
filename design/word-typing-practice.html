<script>
    // Micro-interaction for keyboard
    const keys = document.querySelectorAll('.keyboard-grid button');
    const scoreDisplay = document.getElementById('score-display');
    let score = 0;

    keys.forEach(key => {
        key.addEventListener('click', () => {
            // Visual feedback
            key.classList.add('bg-primary-container');
            setTimeout(() => key.classList.remove('bg-primary-container'), 100);
            
            // Score increment (simulation)
            if (!['Backspace', 'Tab', 'Caps', 'Enter', 'Shift', 'Ctrl', 'Cmd', 'Alt', 'Space'].includes(key.innerText)) {
                score += 10;
                scoreDisplay.innerText = score;
            }
        });
    });
</script>
